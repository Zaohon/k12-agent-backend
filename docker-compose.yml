version: '3.8'
services:
  backend:
    image: ghcr.io/zaohon/k12-agent-backend:latest
    ports:
      - '3000:3000'
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - ALIAI_KEY=sk-sp-4080f1e7e6cb4f578fa5ebfc0de8e31d
      - JWT_SECRET=k12-secret-2026
    volumes:
      - db-data:/app/prisma
    restart: always
    networks:
      - k12-net
  frontend:
    image: ghcr.io/zaohon/k12-agent-frontend:latest
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: always
    networks:
      - k12-net
networks:
  k12-net:
    driver: bridge
volumes:
  db-data:
