version: "3.8"

services:
  backend:
    image: ghcr.io/zaohon/k12-agent-backend:latest
    env_file:
      - ./backend.env
    ports:
      - "3000:3000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/zaohon/k12-agent-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
