name: Backend Production CD

on:
  push:
    branches: [ main ]

jobs:
  # ─── Step 1: Build image on GitHub's powerful servers and push to GHCR ───
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/zaohon/k12-agent-backend:latest

  # ─── Step 2: Upload docker-compose.yml, then SSH to pull & restart ───
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "docker-compose.yml"
          target: "/root/K12AgentWeb"

      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          timeout: 10m
          command_timeout: 10m
          script: |
            cd /root/K12AgentWeb
            COMPOSE="docker-compose"
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            fi
            echo "=== Logging in to GHCR ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            echo "=== Pulling latest backend image ==="
            $COMPOSE pull backend
            echo "=== Restarting backend service ==="
            $COMPOSE up -d backend
            echo "=== Container Status ==="
            $COMPOSE ps
            echo "=== Backend Logs (last 50 lines) ==="
            $COMPOSE logs backend --tail=50


