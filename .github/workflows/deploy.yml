name: Backend Production CD

on:
  push:
    branches: [ main ]

jobs:
  # ─── Step 1: Build image on GitHub's powerful servers and push to GHCR ───
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/zaohon/k12-agent-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Step 2: Upload docker-compose.yml, then SSH to pull & restart ───
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      IMAGE_REGISTRY: ghcr.nju.edu.cn
    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.yml via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          source: "docker-compose.yml"
          target: "/root/K12AgentWeb"

      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          timeout: 10m
          command_timeout: 30m
          script: |
            cd /root/K12AgentWeb
            echo "=== Using image registry: ghcr.nju.edu.cn ==="
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              echo "WARNING: Using deprecated docker-compose v1. Consider upgrading to docker compose v2."
              COMPOSE="docker-compose"
            else
              echo "docker compose is not installed"
              exit 1
            fi
            echo "=== Logging in to GHCR (${IMAGE_REGISTRY}) ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login "ghcr.nju.edu.cn" -u "${{ github.actor }}" --password-stdin
            echo "=== Pulling latest backend image ==="
            $COMPOSE pull backend
            echo "=== Restarting backend service ==="
            $COMPOSE up -d --no-deps backend
            echo "=== Container Status ==="
            $COMPOSE ps
            echo "=== Backend Logs (last 50 lines) ==="
            $COMPOSE logs --tail=50 backend


