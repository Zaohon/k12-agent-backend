name: Backend Production CD

on:
  push:
    branches: [ main ]

jobs:
  # ─── Step 1: Build image on GitHub's powerful servers and push to GHCR ───
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/k12-agent-backend:latest

  # ─── Step 2: SSH to server → update docker-compose → pull → restart ───
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH Remote Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_IP }}
          username: ${{ secrets.REMOTE_USER }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          timeout: 5m
          command_timeout: 5m
          script: |
            mkdir -p /root/K12AgentWeb
            cd /root/K12AgentWeb

            # Write docker-compose.yml using pre-built images (no build on server)
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              backend:
                image: ghcr.io/zaohon/k12-agent-backend:latest
                ports:
                  - '3000:3000'
                environment:
                  - DATABASE_URL=file:/app/prisma/dev.db
                  - ALIAI_KEY=sk-sp-4080f1e7e6cb4f578fa5ebfc0de8e31d
                  - JWT_SECRET=k12-secret-2026
                volumes:
                  - db-data:/app/prisma
                restart: always
                networks:
                  - k12-net
              frontend:
                image: ghcr.io/zaohon/k12-agent-frontend:latest
                ports:
                  - '80:80'
                depends_on:
                  - backend
                restart: always
                networks:
                  - k12-net
            networks:
              k12-net:
                driver: bridge
            volumes:
              db-data:
            EOF

            docker pull ghcr.io/zaohon/k12-agent-backend:latest
            docker compose down backend || true
            docker compose up -d backend
